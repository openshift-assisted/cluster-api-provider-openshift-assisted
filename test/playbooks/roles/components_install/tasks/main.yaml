---
# Components installation entry point
# Conditionally uses MCE Helm chart, standard installation, or OLM-based installation
#
# When skip_capi_install=true:
#   - Installs common dependencies
#   - Skips CAPI/MCE component installation
#
# When skip_capi_install=false (default):
#   - Installs common dependencies
#   - Kind: Installs CAPI components via standard method or MCE chart
#   - OCP: Installs MCE via OLM (CatalogSource, OperatorGroup, Subscription)

- name: Display installation mode
  ansible.builtin.debug:
    msg: >-
      Installing components - Management cluster: {{ management_cluster }},
      MCE chart: {{ use_mce_chart }}, Mode: {{ installation_mode }},
      Skip CAPI install: {{ skip_capi_install }}

# Install common components
# On Kind: cert-manager, prometheus, ironic, BMO, MetalLB, nginx-ingress
# On OCP: MetalLB only (other deps already present)
- name: Install common components
  ansible.builtin.include_tasks: common.yaml

# Skip CAPI/MCE installation if skip_capi_install is true
- name: Skip CAPI installation (manual deployment mode)
  ansible.builtin.debug:
    msg: "Skipping CAPI/MCE installation - skip_capi_install enabled."
  when: skip_capi_install

# Conditionally install CAPI components (only when not skip_capi_install)
- name: Install CAPI components via standard method
  ansible.builtin.include_tasks: capi_standard.yaml
  when: not skip_capi_install and not use_mce_chart and management_cluster != 'ocp'

- name: Install CAPI components via MCE chart
  ansible.builtin.include_tasks: capi_mce.yaml
  when: not skip_capi_install and use_mce_chart and management_cluster != 'ocp'

- name: Install MCE via OLM subscription (OCP)
  ansible.builtin.include_tasks: capi_ocp.yaml
  when: not skip_capi_install and management_cluster == 'ocp'
