[defaults]
# Retry SSH connections on failure
transport = ssh
timeout = 30
connect_timeout = 30

[ssh_connection]
# SSH connection settings for reliability
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=10
pipelining = True
# Retry SSH connections
retries = 5

[persistent_connection]
# Keep connections alive longer
connect_timeout = 30
command_timeout = 120
