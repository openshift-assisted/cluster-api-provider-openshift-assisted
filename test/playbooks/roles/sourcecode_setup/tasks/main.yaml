---
- name: Copy src
  ansible.posix.synchronize:
    src: "{{ playbook_dir }}/../.."
    dest: "{{ src_dir }}"
    archive: true
    recursive: true
    delete: true
    rsync_opts:
      - "--protocol=29"
      - "--include=bootstrap/***"
      - "--include=controlplane/***"
      - "--include=vendor/***"
      - "--include=hack/***"
      - "--include=test/***"
      - "--include=examples/***"
      - "--include=pkg/***"
      - "--include=external_mocks/***"
      - "--include=util/***"
      - "--include=dist/***"
      - "--include=Makefile"
      - "--include=go.mod"
      - "--include=go.sum"
      - "--include=Dockerfile.*"
      - "--include=.golangci.yml"
      - "--include=*-components.yaml"
      - "--exclude=*"
