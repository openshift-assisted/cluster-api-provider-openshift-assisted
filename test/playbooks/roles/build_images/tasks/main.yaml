---
- name: Ensure containers config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/containers"
    state: directory
    mode: '0700'
  when: pull_secret_path is defined and pull_secret_path | length > 0

- name: Configure podman registry authentication
  ansible.builtin.copy:
    src: "{{ pull_secret_path }}"
    dest: "{{ ansible_env.HOME }}/.config/containers/auth.json"
    remote_src: true
    mode: '0600'
  when: pull_secret_path is defined and pull_secret_path | length > 0

- name: Backup system container signature policy
  ansible.builtin.copy:
    src: /etc/containers/policy.json
    dest: /etc/containers/policy.json.backup
    remote_src: true
    mode: '0644'
  become: true

- name: Configure container signature policy for Red Hat registries
  ansible.builtin.copy:
    content: |
      {
          "default": [
              {
                  "type": "insecureAcceptAnything"
              }
          ],
          "transports": {
              "docker-daemon": {
                  "": [
                      {
                          "type": "insecureAcceptAnything"
                      }
                  ]
              }
          }
      }
    dest: /etc/containers/policy.json
    mode: '0644'
  become: true

- name: Build images
  environment:
    CONTAINER_TAG: "{{ container_tag }}"
  ansible.builtin.shell: "cd {{ src_dir }} && setsid make docker-build-all"
  changed_when: true
  register: build_result
  ignore_errors: true

- name: Restore system container signature policy
  ansible.builtin.copy:
    src: /etc/containers/policy.json.backup
    dest: /etc/containers/policy.json
    remote_src: true
    mode: '0644'
  become: true

- name: Fail if build failed
  ansible.builtin.fail:
    msg: "Build images failed: {{ build_result.stderr }}"
  when: build_result.rc != 0

- name: Remove existing container image tar files
  ansible.builtin.file:
    path: "/tmp/{{ item }}.tar.gz"
    state: absent
  loop:
    - controlplane
    - bootstrap
  become: true

- name: Save container images to tar files
  containers.podman.podman_save:
    image: "quay.io/edge-infrastructure/cluster-api-{{ item }}-provider-openshift-assisted:{{ container_tag }}"
    dest: "/tmp/{{ item }}.tar.gz"
    format: docker-archive
  loop:
    - controlplane
    - bootstrap

- name: Load images into kind cluster
  ansible.builtin.command: "kind load image-archive --name {{ kind_cluster_name }} /tmp/{{ item }}.tar.gz"
  become: false
  loop:
    - controlplane
    - bootstrap
  changed_when: true
