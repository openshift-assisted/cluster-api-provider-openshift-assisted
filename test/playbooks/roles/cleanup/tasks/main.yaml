---
- name: Delete sushytools pod
  containers.podman.podman_container:
    name: sushy-tools
    state: absent

# Kind cluster cleanup (only for Kind management cluster)
- name: Delete kind cluster
  ansible.builtin.command: "kind delete cluster --name {{ kind_cluster_name }}"
  changed_when: true
  when: management_cluster | default('kind') == 'kind'

# OCP cluster cleanup (only when explicitly requested)
- name: Cleanup OCP management cluster via miniagent
  ansible.builtin.command:
    cmd: "./sno-cleanup.sh"
    chdir: "{{ miniagent_dir | default('/tmp/miniagent') }}"
  changed_when: true
  when: management_cluster | default('kind') == 'ocp' and management_cluster_cleanup | default(false)

- name: Destroy VMs
  community.libvirt.virt:
    name: "bmh-vm-{{ item }}"
    state: destroyed
  with_sequence:
    count: "{{ number_of_nodes }}"
    format: "%02x"
  failed_when: false

- name: Remove existing network if present
  community.libvirt.virt_net:
    state: absent
    name: bmh
