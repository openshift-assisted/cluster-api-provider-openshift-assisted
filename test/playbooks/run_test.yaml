---
- name: Ensure local requirements
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - local_requirements

- name: Setup and run tests
  hosts: test_runner
  vars_files:
    - vars.yaml
  environment:
    PATH: "{{ extra_paths | join(':') }}:{{ ansible_env.PATH }}"
  roles:
    - ssh_key_setup
    - role: system_dependencies
      become: true
    - sourcecode_setup
    - role: network_setup
      become: true
    - role: baremetal_emulation
      become: true
    - role: kind_setup
      become: true
    - build_images
    - ipa_cache
    - components_install
    - role: bmh_setup
      become: true
    - cluster_install
    - assert_install
    - app_deploy
    - role: assert_upgrade
      when: upgrade_to_version is defined and upgrade_to_version | length > 0
    - role: assert_scale_up_workers
      when: run_scale_up_workers_test | default(false) | bool
    - role: assert_scale_down_workers
      when: run_scale_down_workers_test | default(false) | bool
