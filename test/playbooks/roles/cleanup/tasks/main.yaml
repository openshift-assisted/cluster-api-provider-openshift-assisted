---
- name: Stop IPA HTTP server
  ansible.builtin.shell:
    cmd: pgrep -f 'http\.server.*8089' | xargs -r kill 2>/dev/null || true
  failed_when: false
  become: false
  changed_when: true

- name: Delete sushytools pod
  containers.podman.podman_container:
    name: sushy-tools
    state: absent
  become: false

# Cleanup podman networking issues before attempting to delete kind cluster
- name: Stop all podman containers to prepare for network cleanup
  ansible.builtin.shell: |
    podman ps -q | xargs -r podman stop -t 2
  failed_when: false
  become: false
  changed_when: false

- name: Clean up podman networks to fix aardvark-dns issues
  ansible.builtin.shell: |
    podman network prune -f
  failed_when: false
  become: false
  changed_when: true

# remove kind cluster
- name: Delete kind cluster
  ansible.builtin.command: "kind delete cluster --name {{ kind_cluster_name }}"
  changed_when: true
  become: false
  register: kind_delete_result
  failed_when: false

- name: Force cleanup podman containers if kind delete failed
  ansible.builtin.shell: |
    podman ps -a --filter "name={{ kind_cluster_name }}" --format "{{ '{{' }}.Names{{ '}}' }}" | xargs -r podman rm -f
  when: kind_delete_result.rc != 0
  failed_when: false
  become: false

- name: Verify kind cluster is not present
  ansible.builtin.shell: |
    set -o pipefail
    kind get clusters | grep -q "^{{ kind_cluster_name }}$"
  register: kind_cluster_check
  failed_when: kind_cluster_check.rc == 0
  changed_when: false
  become: false

- name: Destroy VMs
  community.libvirt.virt:
    name: "bmh-vm-{{ item }}"
    state: destroyed
  with_sequence: count="{{ number_of_nodes | default(7) }}" format="%02x"
  failed_when: false

- name: Undefine VMs with NVRAM and storage cleanup
  ansible.builtin.command: "virsh undefine bmh-vm-{{ item }} --nvram --remove-all-storage"
  with_sequence: count="{{ number_of_nodes | default(7) }}" format="%02x"
  failed_when: false
  changed_when: true

- name: Remove existing network if present
  ansible.builtin.shell: |
    virsh net-destroy bmh || true
    virsh net-undefine bmh || true
  changed_when: true
  failed_when: false

# DNS Configuration Cleanup
- name: Get list of test cluster names
  ansible.builtin.set_fact:
    test_clusters:
      - "test-sno"
      - "test-multinode"

- name: Remove cluster DNS entries from /etc/hosts
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED BLOCK - {{ item }}"
    state: absent
  loop: "{{ test_clusters }}"
  failed_when: false

- name: Restore original DNS servers in /etc/resolv.conf
  ansible.builtin.shell: |
    # Get DNS servers from NetworkManager
    DNS_SERVERS=$(nmcli dev show | grep 'IP4.DNS' | awk '{print $2}')

    # Create new resolv.conf with only NetworkManager DNS servers
    echo "# Generated by NetworkManager" > /etc/resolv.conf
    for dns in $DNS_SERVERS; do
      echo "nameserver $dns" >> /etc/resolv.conf
    done
  changed_when: true
  failed_when: false

- name: Restore default DNS settings in containers.conf
  ansible.builtin.lineinfile:
    path: /usr/share/containers/containers.conf
    regexp: '^dns_servers = .*'
    line: '#dns_servers = []'
    state: present
  failed_when: false

- name: Restore default pids limit in containers.conf
  ansible.builtin.lineinfile:
    path: /usr/share/containers/containers.conf
    regexp: '^pids_limit = .*'
    line: '# pids_limit = 2048'
    state: present
  failed_when: false

- name: Clean up unused podman resources
  ansible.builtin.shell: |
    podman system prune -a -f --volumes
  failed_when: false
  become: false
  changed_when: true

- name: Reset podman networking completely
  ansible.builtin.shell: |
    podman network prune -f
  failed_when: false
  become: false
  changed_when: true

- name: Restart podman service after cleanup
  ansible.builtin.systemd_service:
    state: restarted
    daemon_reload: true
    name: podman
  failed_when: false
